name: pearlhub_admin
description: PearlHub Admin App — platform overview, listing moderation, user management, taxi admin.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared:
    path: ../shared
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.0
  fl_chart: ^0.70.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
